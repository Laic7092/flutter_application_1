name: Build iOS IPA (Flutter, Unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'    # 或你的本地版本
          channel: 'stable'

      - run: flutter pub get

      - name: Remove Development Team from Xcode project
        run: |
          cd ios
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' Runner.xcodeproj/project.pbxproj
          cd ..

      - run: flutter build ios --release --no-codesign

      - run: |
          mkdir Payload
          cp -R build/ios/Release-iphoneos/Runner.app Payload/
          zip -r runner.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: runner.ipa
          path: runner.ipa
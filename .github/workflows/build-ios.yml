name: Build Unsigned iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      # 去除项目中的签名配置（不 clean，避免删掉必要文件）
      - name: Strip code signing from Xcode project
        working-directory: ios
        run: |
          sed -i '' '/DevelopmentTeam = .*;/d' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = "[^"]*"/PROVISIONING_PROFILE_SPECIFIER = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "[^"]*"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj

      # 确保 CocoaPods 的依赖也被关闭签名
      - name: Patch Podfile to skip signing for all pods
        working-directory: ios
        run: |
          if ! grep -q "CODE_SIGNING_ALLOWED" Podfile; then
            cat >> Podfile << 'EOF'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['DEVELOPMENT_TEAM'] = ''
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
              end
            end
          end
          EOF
          fi

      # 预构建（保证所有 Flutter 生成文件就位，但不真正签名）
      # 用 xcodebuild 前必须 pod install，但 pod install 依赖 Generated.xcconfig，
      # 所以先跑一次 flutter build 的代码生成部分，即使它会失败也没关系
      - name: Ensure Flutter generated files exist (force generation)
        run: |
          flutter precache --ios
          # 如果 Generated.xcconfig 还不存在，手动生成一个最小占位
          if [ ! -f ios/Flutter/Generated.xcconfig ]; then
            mkdir -p ios/Flutter
            echo "// Generated by CI" > ios/Flutter/Generated.xcconfig
          fi

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      # 方法一：直接用 xcodebuild 构建未签名包（首选）
      - name: Build unsigned app with xcodebuild
        working-directory: ios
        run: |
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/ios \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGN_IDENTITY="" \
            -allowProvisioningUpdates \
            archive

      # 方法二（回退）：如果 xcodebuild 失败，再尝试 flutter build
      - name: Fallback to flutter build
        if: failure()
        run: |
          flutter build ios --no-codesign --release -- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO DEVELOPMENT_TEAM="" PROVISIONING_PROFILE="" CODE_SIGN_IDENTITY=""

      - name: Package IPA
        if: success() || failure()   # 即使上一步 flutter build 也失败，只要 .app 存在就打包
        run: |
          # 尝试从 archive 里提取
          if [ -d build/ios/archive/Runner.xcarchive ]; then
            cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/iphoneos/Runner.app
          fi
          # 否则，flutter build 会直接生成在这里
          if [ ! -d build/ios/iphoneos/Runner.app ]; then
            echo "Runner.app not found, build likely failed completely"
            exit 1
          fi
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r Runner.ipa Payload
          echo "IPA created at build/ios/iphoneos/Runner.ipa"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: build/ios/iphoneos/Runner.ipa
